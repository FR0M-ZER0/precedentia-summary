apiVersion: apps/v1
kind: Deployment
metadata:
  name: precedentia-summary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: summary
  template:
    metadata:
      labels:
        app: summary
    spec:
      containers:
      - name: summary

        image: docker.io/gabguimaraes/precedentia-summary:49cb3f6

        ports:
        - containerPort: 5002
        env:
          - name: EMBEDDING_URL
            value: "http://embedding-service:5001"
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "4Gi"
            cpu: "2000m"

