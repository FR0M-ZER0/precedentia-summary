apiVersion: apps/v1
kind: Deployment
metadata:
  name: precedentia-summary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: summary
  template:
    metadata:
      labels:
        app: summary
    spec:
      containers:
      - name: summary

        image: docker.io/gabguimaraes/precedentia-summary:2c2a8a1bba8c6cc3e46ed825ca40f5d7b5030fbe

        ports:
        - containerPort: 5002
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "4Gi"
            cpu: "2000m"

