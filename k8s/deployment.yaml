apiVersion: apps/v1
kind: Deployment
metadata:
  name: precedentia-summary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: summary
  template:
    metadata:
      labels:
        app: summary
    spec:
      containers:
      - name: summary
        image: docker.io/gabguimaraes/precedentia-summary:latest
        ports:
        - containerPort: 5002
        env:
        - name: QDRANT_HOST
          value: "qdrant-db"
        - name: QDRANT_PORT
          value: "6333"
        - name: REDIS_HOST
          value: "redis-db-master"
        - name: REDIS_PORT
          value: "6379"
        - name: OLLAMA_HOST
          value: "ollama-service"
        - name: OLLAMA_PORT
          value: "11434"
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
