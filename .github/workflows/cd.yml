name: CD Pipeline
on:
  push:
    branches: [ "main", "dev", "hml" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        run: |
          IMAGE_TAG=$(git rev-parse --short HEAD)
          FULL_IMAGE="docker.io/gabguimaraes/precedentia-summary:$IMAGE_TAG"
          
          docker build -t $FULL_IMAGE .
          docker push $FULL_IMAGE

      - name: Update K8s Manifest
        run: |
          IMAGE_TAG=$(git rev-parse --short HEAD)
          FULL_IMAGE="docker.io/gabguimaraes/precedentia-summary:$IMAGE_TAG"

          sed -i "s|image: .*gabguimaraes.*|image: $FULL_IMAGE|g" k8s/deployment.yaml

          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add k8s/deployment.yaml
          git commit -m "CD: Update Summary image tag to $IMAGE_TAG [skip ci]"
          git push