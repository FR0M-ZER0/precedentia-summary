name: CI/CD Unificado - Precedentia Summary

on:
  push:
    branches: [ "main", "hml", "dev" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate Tag
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: |
            gabguimaraes/precedentia-summary:latest
            gabguimaraes/precedentia-summary:${{ steps.vars.outputs.sha_short }}

      - name: Update K8s Manifest
        run: |
          FULL_IMAGE="docker.io/gabguimaraes/precedentia-summary:${{ steps.vars.outputs.sha_short }}"
          
          sed -i "s|image: .*gabguimaraes/precedentia-summary.*|image: $FULL_IMAGE|g" k8s/deployment.yaml

          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git pull origin ${{ github.ref_name }} --rebase
          git add k8s/deployment.yaml
          git commit -m "GitOps: Update Summary to ${{ steps.vars.outputs.sha_short }} [skip ci]"
          git push
